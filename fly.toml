# Fly.io deployment config for DocCompare Pro
app = "doccompare-pro"
primary_region = "sin"   # Singapore — closest to India

[build]
  dockerfile = "Dockerfile.fly"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  UPLOAD_DIR = "/tmp/doccompare/uploads"
  RESULT_DIR = "/tmp/doccompare/results"
  RESULT_TTL = "604800"
